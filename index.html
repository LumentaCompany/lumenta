<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PARK DONG GEUN | LUMENTA COMPANY</title>
<meta name="description" content="PARK DONG GEUN, CEO & Founder of LUMENTA COMPANY." />
<meta name="theme-color" content="#050505" />
<meta property="og:title" content="PARK DONG GEUN | LUMENTA COMPANY" />
<meta property="og:description" content="CEO & Founder | LUMENTA COMPANY" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="LUMENTA COMPANY" />
<style>
:root {
  --gold:#d7b365;
  --gold-soft:#f1d99b;
  --silver:#ececec;
  --white:#f7f3e8;
  --line:rgba(215,179,101,.26);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#050505; }
body {
  min-height:100svh;
  color:var(--white);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:
    radial-gradient(circle at 50% -10%, rgba(255,255,255,.11), transparent 31%),
    radial-gradient(circle at 12% 18%, rgba(255,255,255,.055), transparent 22%),
    radial-gradient(circle at 88% 78%, rgba(215,179,101,.14), transparent 30%),
    linear-gradient(180deg,#0a0a0a 0%,#040404 58%,#000 100%);
  overflow-x:hidden;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(125deg, transparent 0 20%, rgba(255,255,255,.045) 20.4%, transparent 25%),
    linear-gradient(136deg, transparent 0 63%, rgba(215,179,101,.18) 63.3%, transparent 67%),
    radial-gradient(circle at 82% 82%, rgba(215,179,101,.16), transparent 24%);
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at 50% 42%, transparent 0 43%, rgba(0,0,0,.78) 100%);
}
.page {
  position:relative;
  z-index:2;
  min-height:100svh;
  width:min(100%,560px);
  margin:auto;
  display:grid;
  place-items:center;
  padding:18px 12px;
}
.card {
  width:100%;
  min-height:min(860px, calc(100svh - 36px));
  border-radius:34px;
  padding:42px 30px 32px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.07), transparent 38%),
    linear-gradient(180deg, rgba(255,255,255,.048), rgba(255,255,255,.012));
  border:1px solid rgba(215,179,101,.24);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.075),
    0 38px 110px rgba(0,0,0,.72);
  backdrop-filter:blur(22px);
  overflow:hidden;
}
.logo {
  width:min(285px,72vw);
  height:auto;
  margin:0 auto;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 18px 32px rgba(0,0,0,.9)) drop-shadow(0 0 22px rgba(255,255,255,.14));
}
.divider {
  width:138px;
  height:1px;
  margin:28px auto 30px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--silver),transparent);
  position:relative;
}
.divider::after {
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:8px;
  height:8px;
  transform:translate(-50%,-50%) rotate(45deg);
  background:var(--gold-soft);
  box-shadow:0 0 20px rgba(215,179,101,.9);
}
.name {
  white-space:nowrap;
  font-family:Georgia,"Times New Roman",serif;
  font-weight:500;
  font-size:clamp(28px, 7vw, 42px);
  letter-spacing:.04em;
  line-height:1;
  background:linear-gradient(180deg,#fff8e1 0%,#d8b56c 50%,#fff0c9 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.kor {
  margin-top:18px;
  font-size:15px;
  letter-spacing:.18em;
  color:var(--gold-soft);
}
.role {
  margin-top:12px;
  font-size:11px;
  letter-spacing:.28em;
  color:rgba(255,255,255,.80);
  text-transform:uppercase;
}
.spacer-line {
  width:1px;
  height:74px;
  margin:28px auto 24px;
  background:linear-gradient(180deg,var(--gold),rgba(215,179,101,.10));
  position:relative;
}
.spacer-line::after {
  content:"";
  position:absolute;
  left:50%;
  bottom:0;
  width:6px;
  height:6px;
  border-radius:50%;
  transform:translateX(-50%);
  background:var(--gold-soft);
  box-shadow:0 0 18px rgba(215,179,101,.95);
}
.contact-grid {
  width:100%;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:16px 0;
}
.contact {
  text-decoration:none;
  color:rgba(255,255,255,.90);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:72px;
  padding:0 8px;
  border-right:1px solid rgba(215,179,101,.24);
}
.contact:last-child { border-right:0; }
.contact svg {
  width:22px;
  height:22px;
  stroke:var(--gold);
  fill:none;
  stroke-width:1.65;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.contact strong {
  font-size:11px;
  line-height:1.25;
  font-weight:600;
  word-break:break-word;
}
.contact span {
  font-size:9px;
  letter-spacing:.23em;
  color:rgba(215,179,101,.82);
  text-transform:uppercase;
}
.tagline {
  margin-top:28px;
  font-size:10px;
  letter-spacing:.36em;
  color:var(--gold-soft);
  text-transform:uppercase;
}
@media(max-width:430px) {
  .page { padding:10px 8px; }
  .card {
    min-height:calc(100svh - 20px);
    border-radius:28px;
    padding:34px 20px 28px;
  }
  .logo { width:min(250px,72vw); }
  .divider { margin:25px auto 28px; }
  .name {
    font-size:clamp(25px, 7.0vw, 29px);
    letter-spacing:.018em;
  }
  .kor { font-size:14px; letter-spacing:.15em; }
  .role { font-size:10px; letter-spacing:.23em; }
  .spacer-line { height:62px; margin:24px auto 22px; }
  .contact-grid {
    grid-template-columns:1fr;
    padding:0;
  }

  .contact {
    min-height:58px;
    padding:0 16px;
    flex-direction:row;
    justify-content:center;
    gap:12px;
    border-right:0;
    border-bottom:1px solid rgba(215,179,101,.16);
  }

  .contact:last-child {
    border-bottom:0;
  }

  .contact svg {
    width:18px;
    height:18px;
  }

  .contact strong {
    font-size:13px;
    white-space:nowrap;
    word-break:keep-all;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .contact span {
    display:none;
  }

  .tagline { font-size:9px; letter-spacing:.26em; }
}
</style>
</head>
